# =============================================================================
#  Nginx Reverse Proxy — Sistema Blitz
#  Dominio: jesuslab135.com
#  SSL: Let's Encrypt (Certbot)
# =============================================================================

# Redirect HTTP → HTTPS (excepto la ruta de verificación de Let's Encrypt)
server {
    listen 80;
    server_name jesuslab135.com www.jesuslab135.com;

    # Let's Encrypt necesita esta ruta para verificar/renovar el certificado
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Servidor principal
server {
    listen 443 ssl;
    http2 on;
    server_name jesuslab135.com www.jesuslab135.com;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/jesuslab135.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jesuslab135.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # --- Backend: /api/ ---
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend: WebSockets /ws/ ---
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # --- Frontend: todo lo demás ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
