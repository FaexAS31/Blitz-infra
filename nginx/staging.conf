# =============================================================================
#  Nginx — Configuracion para STAGING (HTTP + HTTPS)
#
#  Copiar este archivo como nginx/default.conf en /root/app-dev/
#  Reutiliza los certificados Let's Encrypt de produccion.
#  Acceso: https://jesuslab135.com:8443
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# HTTPS — Servidor principal staging
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Reutiliza certificados Let's Encrypt de produccion
    ssl_certificate     /etc/letsencrypt/live/jesuslab135.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jesuslab135.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # --- Backend: /api/ ---
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend: WebSockets /ws/ ---
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # --- Grafana: /grafana/ ---
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend: todo lo demas ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
