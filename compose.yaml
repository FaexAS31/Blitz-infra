name: sistema-blitz

services:
  # ---------------------------------------------------------------------------
  #  BACKEND (Django + Daphne ASGI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: blitz_backend
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/src:/app
    ports:
      - "8000:8000"
    tty: true
    stdin_open: true
    depends_on:
      - db
      - redis
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  FRONTEND (React + Vite)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: blitz_frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    env_file:
      - ../frontend/.env
    ports:
      - "5173:5173"
    tty: true
    stdin_open: true
    depends_on:
      - backend
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: blitz_db
    environment:
      POSTGRES_USER: blitz_db
      POSTGRES_PASSWORD: Blitz@$$135
      POSTGRES_DB: blitz_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  REDIS (Django Channels WebSocket)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: blitz_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blitz-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  #  PGADMIN (Database GUI)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: blitz_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blitz.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "6060:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - blitz-net

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  blitz-net:
    driver: bridge
