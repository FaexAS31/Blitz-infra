# =============================================================================
#  SISTEMA BLITZ — Docker Compose (Multi-Environment)
#
#  ARCHIVO UNICO para Produccion y Staging.
#  La diferencia entre entornos se controla via el archivo .env
#  que vive en cada directorio de despliegue:
#
#    /root/app/.env       → Producción (COMPOSE_PROJECT_NAME=blitz-prod)
#    /root/app-dev/.env   → Staging    (COMPOSE_PROJECT_NAME=blitz-dev)
#
#  Docker Compose auto-prefija contenedores, volumenes y redes con
#  COMPOSE_PROJECT_NAME, evitando colisiones entre entornos.
#
#  IMPORTANTE: NO usar container_name: en ningun servicio.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  #  NGINX — Reverse Proxy
  #  En produccion: sirve HTTPS con certificados Let's Encrypt
  #  En staging:    sirve HTTP en puerto alternativo (ver .env)
  #  Cada entorno tiene su propio nginx/default.conf en su directorio
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  CERTBOT — Renovacion automatica SSL (solo Produccion)
  #  Se activa con COMPOSE_PROFILES=ssl en el .env de produccion
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    profiles: ["ssl"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  BACKEND (Django / Daphne ASGI)
  # ---------------------------------------------------------------------------
  backend:

    # --- LOCAL: build desde codigo fuente ---
    # build:
    #   context: ../backend
    #   dockerfile: Dockerfile

    # --- DEPLOY: imagen pre-construida en GHCR ---
    image: ghcr.io/jesuslab135/blitz-backend:${IMAGE_TAG:-latest}

    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      HOST: db
      PORT: "5432"
      REDIS_HOST: redis
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

    # Puerto interno siempre 8000 (Daphne CMD). Puerto externo parametrizado.
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    tty: true
    stdin_open: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  FRONTEND (React + Vite, servido por Nginx interno)
  # ---------------------------------------------------------------------------
  frontend:

    # --- LOCAL: build desde codigo fuente ---
    # build:
    #   context: ../frontend
    #   dockerfile: Dockerfile

    # --- DEPLOY: imagen pre-construida en GHCR ---
    image: ghcr.io/jesuslab135/blitz-frontend:${IMAGE_TAG:-latest}

    # Comparte dist/ con nginx via volumen
    volumes:
      - frontend_dist:/usr/share/nginx/html
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - blitz-net

  # ---------------------------------------------------------------------------
  #  BASE DE DATOS — PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - blitz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  #  REDIS — Cache + Django Channels WebSocket layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - blitz-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  PGADMIN — Administracion de BD (desactivar en produccion real)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@blitz.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - blitz-net

# =============================================================================
# VOLUMENES Y REDES
# Docker Compose los prefija automaticamente con COMPOSE_PROJECT_NAME.
# Produccion: blitz-prod_postgres_data, blitz-prod_blitz-net, etc.
# Staging:    blitz-dev_postgres_data,  blitz-dev_blitz-net,  etc.
# → Aislamiento total sin configuracion adicional.
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  certbot_conf:
  certbot_www:
  pgadmin_data:

networks:
  blitz-net:
    driver: bridge
